// ════════════════════════════════════════════════
// IndexedDB 저장소 (사진 포함 무제한 저장)
// ════════════════════════════════════════════════
const DB_NAME = "mestory_db";
const DB_VER  = 1;
const STORE   = "items";

function openDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => e.target.result.createObjectStore(STORE, { keyPath: "id" });
    req.onsuccess = e => res(e.target.result);
    req.onerror   = e => rej(e.target.error);
  });
}
async function dbGetAll() {
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx  = db.transaction(STORE, "readonly");
    const req = tx.objectStore(STORE).getAll();
    req.onsuccess = () => res(req.result);
    req.onerror   = () => rej(req.error);
  });
}
async function dbPut(item) {
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx  = db.transaction(STORE, "readwrite");
    const req = tx.objectStore(STORE).put(item);
    req.onsuccess = () => res();
    req.onerror   = () => rej(req.error);
  });
}
async function dbDelete(id) {
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx  = db.transaction(STORE, "readwrite");
    const req = tx.objectStore(STORE).delete(id);
    req.onsuccess = () => res();
    req.onerror   = () => rej(req.error);
  });
}

// ════════════════════════════════════════════════
// 사진 압축 (Canvas → JPEG, 최대 900px, 품질 0.75)
// ════════════════════════════════════════════════
function compressImage(file, maxPx = 900, quality = 0.75) {
  return new Promise((res, rej) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      let w = img.width, h = img.height;
      if (w > maxPx || h > maxPx) {
        if (w >= h) { h = Math.round(h * maxPx / w); w = maxPx; }
        else        { w = Math.round(w * maxPx / h); h = maxPx; }
      }
      const canvas = document.createElement("canvas");
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, w, h);
      const mime = file.type === "image/png" ? "image/png" : "image/jpeg";
      res(canvas.toDataURL(mime, quality));
    };
    img.onerror = rej;
    img.src = url;
  });
}
function byteSize(b64) {
  const padding = (b64.match(/=+$/) || [""])[0].length;
  return Math.round((b64.length * 3) / 4 - padding);
}
function fmtSize(bytes) {
  if (bytes < 1024) return bytes + " B";
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
  return (bytes / 1024 / 1024).toFixed(2) + " MB";
}

// ════════════════════════════════════════════════
const LNY = {2020:[1,25],2021:[2,12],2022:[2,1],2023:[1,22],2024:[2,10],2025:[1,29],2026:[2,17],2027:[2,6],2028:[1,26],2029:[2,13],2030:[2,3]};
const LMD = {2020:[29,30,29,29,30,29,30,29,30,30,30,29],2021:[29,30,29,30,29,30,29,29,30,29,30,29],2022:[30,29,30,29,30,29,30,29,29,30,29,30],2023:[29,30,29,30,29,30,29,30,29,29,30,29],2024:[30,29,30,29,30,29,30,29,30,29,29,30],2025:[29,30,29,30,29,30,29,30,29,30,29,29],2026:[30,29,30,29,30,29,30,29,30,29,30,29],2027:[29,30,29,30,29,29,30,29,30,29,30,30],2028:[29,29,30,29,30,29,30,29,30,29,30,29],2029:[30,29,29,30,29,30,29,30,29,30,29,30],2030:[29,30,29,29,30,29,30,29,30,30,29,30]};
function lunarToSolar(y,m,d){if(!LNY[y])return null;const[nm,nd]=LNY[y];const b=new Date(y,nm-1,nd);let o=d-1;for(let i=1;i<m;i++)o+=(LMD[y]?.[i-1]??30);b.setDate(b.getDate()+o);return b;}
function nextLunar(lm,ld){const t=new Date();t.setHours(0,0,0,0);for(let y=t.getFullYear();y<=t.getFullYear()+1;y++){const d=lunarToSolar(y,lm,ld);if(d&&d>=t)return d;}return null;}
function fmt(d){if(!d)return"";return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function getDday(item){
  const t=new Date(); t.setHours(0,0,0,0);
  let tgt;
  if(item.isLunar){ tgt=nextLunar(item.lm,item.ld); if(!tgt) return null; }
  else { tgt=new Date(item.date); tgt.setHours(0,0,0,0); }
  return Math.round((tgt-t)/86400000);
}
function dispDate(item){
  if(item.isLunar){ const d=nextLunar(item.lm,item.ld); return d?("음력 "+item.lm+"/"+item.ld+" ("+fmt(d)+")"):("음력 "+item.lm+"/"+item.ld); }
  return item.date;
}

  {id:4,tag:"기념일",emoji:"🏮",title:"추석",date:"",repeat:"매년",color:"#F59E0B",isLunar:true,lm:8,ld:15,photo:""},
];

// ════════════════════════════════════════════════
// 상태
// ════════════════════════════════════════════════
let items = [];
let filter = "전체";
let modalState = null; // null | "add" | item object
let modalForm = null;
let suggestState = null;
let storageInfo = null;

// ════════════════════════════════════════════════
// 렌더링
// ════════════════════════════════════════════════
function sprocketRow() {
  let html = '<div class="sprocket-row">';
  for (let i = 0; i < 22; i++) html += '<div class="sprocket"></div>';
  html += '</div>';
  return html;
}

function ddayBadgeHtml(diff) {
  if (diff === null) return "";
  let label, bg, color, shadow;
  if (diff === 0) { label = "D-DAY"; bg = "linear-gradient(135deg,#FF6B9D,#FF8E53)"; color = "white"; shadow = "0 0 12px #FF6B9D77"; }
  else if (diff > 0) { label = "D-" + diff; bg = "linear-gradient(135deg,#A78BFA,#60A5FA)"; color = "white"; shadow = "0 0 10px #A78BFA55"; }
  else { label = "D+" + Math.abs(diff); bg = "#222"; color = "#555"; shadow = "none"; }
  return '<div class="dday-badge" style="background:' + bg + ';color:' + color + ';box-shadow:' + shadow + '">' + label + '</div>';
}

function filmHolesHtml() {
  let html = '<div class="film-holes">';
  for (let i = 0; i < 7; i++) html += '<div class="film-hole"></div>';
  return html + '</div>';
}

function filmCardHtml(item, index) {
  const diff = getDday(item);
  const hasPhoto = !!item.photo;
  let photoSection;
  if (hasPhoto) {
    const pos = item.photoPos || { x: 50, y: 50 };
    photoSection =
      '<div class="film-photo-wrap">' +
        '<img src="' + item.photo + '" style="object-position:' + pos.x + '% ' + pos.y + '%" onerror="this.style.display=&#39;none&#39;;" />' +
        '<div class="film-grain"></div>' +
        '<div class="film-vignette"></div>' +
        '<div class="film-badge-corner">' + ddayBadgeHtml(diff) + '</div>' +
      '</div>';
  } else {
    let stars = "";
    for (let i = 0; i < 16; i++) {
      const sz = i % 4 === 0 ? 2 : 1;
      stars += '<div class="star" style="width:' + sz + 'px;height:' + sz + 'px;opacity:' + (0.15 + Math.random() * 0.35) + ';top:' + (5 + Math.random() * 88) + '%;left:' + (3 + Math.random() * 94) + '%"></div>';
    }
    photoSection =
      '<div class="film-placeholder">' + stars +
        '<div class="big-emoji" style="filter:drop-shadow(0 0 16px ' + item.color + ')">' + item.emoji + '</div>' +
        '<div class="film-badge-corner">' + ddayBadgeHtml(diff) + '</div>' +
      '</div>';
  }

  return (
    '<div class="film-card" data-id="' + item.id + '">' +
      '<div class="film-side left">' + filmHolesHtml() + '</div>' +
      '<div class="film-body">' +
        '<div class="film-meta">' +
          '<div class="film-meta-left"><span class="film-meta-emoji">' + item.emoji + '</span>' +
          '<span class="film-meta-id">MESTORY ' + String(index + 1).padStart(2, "0") + '</span></div>' +
          '<span class="film-meta-tag">' + item.tag.toUpperCase() + (item.isLunar ? " 🌙" : "") + '</span>' +
        '</div>' +
        photoSection +
        '<div class="film-bottom">' +
          '<div style="flex:1;min-width:0">' +
            '<div class="film-bottom-title">' + escapeHtml(item.title) + '</div>' +
            '<div class="film-bottom-date">' + dispDate(item) + (item.repeat !== "없음" ? " · " + item.repeat : "") + '</div>' +
          '</div>' +
          (item.photo ? '<div class="film-bottom-size">' + fmtSize(byteSize(item.photo)) + '</div>' : "") +
        '</div>' +
      '</div>' +
      '<div class="film-side right">' + filmHolesHtml() + '</div>' +
    '</div>'
  );
}

function escapeHtml(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

function render() {
  const tagsSet = ["전체", ...Array.from(new Set(items.map(i => i.tag)))];
  const filtered = filter === "전체" ? items : items.filter(i => i.tag === filter);
  const sorted = [...filtered].sort((a, b) => {
    const da = getDday(a), db = getDday(b);
    if (da === null) return 1;
    if (db === null) return -1;
    return da - db;
  });
  const ddayCount = items.filter(i => getDday(i) === 0).length;

  let storageHtml = "";
  if (storageInfo) {
    const pct = Math.min(100, (storageInfo.usage / storageInfo.quota) * 100);
    storageHtml =
      '<div class="storage-box">' +
        '<div class="storage-label">저장소</div>' +
        '<div class="storage-val">' + fmtSize(storageInfo.usage) + ' / ' + fmtSize(storageInfo.quota) + '</div>' +
        '<div class="storage-bar-bg"><div class="storage-bar-fill" style="width:' + pct + '%"></div></div>' +
      '</div>';
  }

  const html =
    '<div class="header">' +
      '<div class="header-top">' +
        '<div class="logo-row">' +
          '<div class="logo-icon">🎞️</div>' +
          '<div><div class="logo-title">Mestory</div><div class="logo-sub">MY D-DAY STORY</div></div>' +
        '</div>' +
        storageHtml +
      '</div>' +
      (ddayCount > 0 ? '<div class="dday-banner"><span>🎉</span><span class="txt">오늘 D-DAY가 ' + ddayCount + '개 있어요!</span></div>' : '') +
      sprocketRow() +
    '</div>' +
    '<div class="filters">' +
      tagsSet.map(t => '<button class="filter-chip ' + (filter === t ? "active" : "") + '" data-filter="' + escapeHtml(t) + '">' + escapeHtml(t) + '</button>').join("") +
    '</div>' +
    '<div class="film-list">' +
      (sorted.length === 0
        ? '<div class="empty-state"><div class="emoji">🎞️</div><div class="txt">첫 컷을 찍어보세요!</div></div>'
        : sorted.map((item, idx) => filmCardHtml(item, idx)).join("")) +
    '</div>' +
    '<div class="bottom-bar">' +
      sprocketRow() +
      '<button class="add-btn" id="addBtn"><span style="font-size:18px">🎞️</span> 새 컷 추가하기</button>' +
    '</div>' +
    modalHtml();

  document.getElementById("app").innerHTML = html;
  attachEvents();
}

// ════════════════════════════════════════════════
// 모달
// ════════════════════════════════════════════════
function modalHtml() {
  if (!modalState) return '<div class="modal-overlay hidden"></div>';
  const isEdit = !!modalForm.id;
  const previewSolar = modalForm.isLunar ? (() => { const d = nextLunar(modalForm.lm, modalForm.ld); return d ? fmt(d) : "변환불가"; })() : null;

  return (
    '<div class="modal-overlay" id="modalOverlay">' +
      '<div class="modal-sheet" id="modalSheet">' +
        '<div class="modal-handle"></div>' +
        '<div class="modal-title">' + (isEdit ? "✏️ 수정하기" : "🎞️ 새 컷 추가") + '</div>' +

        '<div class="photo-section">' +
          '<div class="field-label">📷 사진 (자동 압축 저장)</div>' +
          photoUploaderHtml() +
        '</div>' +

        '<div class="field">' +
          '<div class="field-label">제목</div>' +
          '<input type="text" id="titleInput" placeholder="어떤 날인가요?" value="' + escapeHtml(modalForm.title || "") + '"/>' +
          (suggestState ?
            '<div class="suggest-box">' +
              '<span class="suggest-emoji">' + suggestState.emoji + '</span>' +
              '<span class="suggest-txt">키워드 자동 감지!</span>' +
              '<button class="suggest-apply" id="suggestApply">적용</button>' +
              '<button class="suggest-dismiss" id="suggestDismiss">✕</button>' +
            '</div>' : '') +
        '</div>' +

        '<div class="field">' +
          '<div class="field-label">이모지</div>' +
          '<div class="emoji-grid">' +
            EMOJIS.map(e => '<button class="emoji-btn ' + (modalForm.emoji === e ? "active" : "") + '" data-emoji="' + e + '">' + e + '</button>').join("") +
          '</div>' +
        '</div>' +

        '<div class="field">' +
          '<div class="field-label">색상</div>' +
          '<div class="color-grid">' +
            COLORS.map(c => '<button class="color-btn ' + (modalForm.color === c ? "active" : "") + '" data-color="' + c + '" style="background:' + c + (modalForm.color === c ? ';box-shadow:0 0 0 2px ' + c : '') + '"></button>').join("") +
          '</div>' +
        '</div>' +

        '<div class="field">' +
          '<div class="field-label">날짜 유형</div>' +
          '<div class="type-toggle">' +
            '<button class="type-btn ' + (!modalForm.isLunar ? "active" : "") + '" data-lunar="false">☀️ 양력</button>' +
            '<button class="type-btn ' + (modalForm.isLunar ? "active" : "") + '" data-lunar="true">🌙 음력</button>' +
          '</div>' +
        '</div>' +

        (modalForm.isLunar ?
          '<div class="field">' +
            '<div class="lunar-row">' +
              '<div><div class="field-label">음력 월</div><select id="lmSelect">' +
                Array.from({length:12},(_,i)=>i+1).map(n => '<option value="' + n + '" ' + (modalForm.lm === n ? "selected" : "") + '>' + n + '월</option>').join("") +
              '</select></div>' +
              '<div><div class="field-label">음력 일</div><select id="ldSelect">' +
                Array.from({length:30},(_,i)=>i+1).map(n => '<option value="' + n + '" ' + (modalForm.ld === n ? "selected" : "") + '>' + n + '일</option>').join("") +
              '</select></div>' +
            '</div>' +
            (previewSolar ? '<div class="lunar-preview">→ 올해 양력: ' + previewSolar + '</div>' : '') +
          '</div>' :
          '<div class="field">' +
            '<div class="field-label">날짜</div>' +
            '<input type="date" id="dateInput" value="' + (modalForm.date || "") + '"/>' +
          '</div>'
        ) +

        '<div class="field two-col">' +
          '<div><div class="field-label">태그</div><select id="tagSelect">' +
            TAGS.map(t => '<option value="' + t + '" ' + (modalForm.tag === t ? "selected" : "") + '>' + t + '</option>').join("") +
          '</select></div>' +
          '<div><div class="field-label">반복</div><select id="repeatSelect">' +
            REPEATS.map(r => '<option value="' + r + '" ' + (modalForm.repeat === r ? "selected" : "") + '>' + r + '</option>').join("") +
          '</select></div>' +
        '</div>' +

        '<button class="save-btn" id="saveBtn">' + (isEdit ? "💾 저장하기" : "🎞️ 추가하기") + '</button>' +
        (isEdit ? '<button class="delete-btn" id="deleteBtn">🗑️ 삭제하기</button>' : '') +
      '</div>' +
    '</div>'
  );
}

function photoUploaderHtml() {
  const photo = modalForm.photo;
  if (photo) {
    const pos = modalForm.photoPos || { x: 50, y: 50 };
    const sizeTag = modalForm._compSize
      ? '<div class="photo-size-tag">' +
          (modalForm._origSize ? '<span class="photo-size-orig">' + fmtSize(modalForm._origSize) + '</span>' : '') +
          '<span class="photo-size-comp">' + fmtSize(modalForm._compSize) + '</span>' +
        '</div>'
      : '';
    return (
      '<div class="photo-preview" id="photoPreview">' +
        '<img id="photoPreviewImg" src="' + photo + '" style="object-position:' + pos.x + '% ' + pos.y + '%"/>' +
        '<div class="photo-overlay">' +
          '<button class="photo-change-btn" id="photoChangeBtn">🔄 변경</button>' +
          '<button class="photo-delete-btn" id="photoDeleteBtn">✕ 삭제</button>' +
        '</div>' +
        sizeTag +
      '</div>' +
      '<div class="photo-drag-hint">✋ 사진을 드래그하면 위치를 조정할 수 있어요</div>' +
      '<input type="file" accept="image/*" id="photoFileInput" style="display:none"/>'
    );
  }
  return (
    '<div class="photo-drop" id="photoDrop">' +
      '<span class="icon">📷</span>' +
      '<span class="txt1">클릭 또는 드래그로 사진 추가</span>' +
      '<span class="txt2">자동으로 압축되어 기기에 저장돼요</span>' +
    '</div>' +
    '<input type="file" accept="image/*" id="photoFileInput" style="display:none"/>'
  );
}

// ════════════════════════════════════════════════
// 이벤트 바인딩
// ════════════════════════════════════════════════
function attachEvents() {
  // 필터
  document.querySelectorAll(".filter-chip").forEach(btn => {
    btn.onclick = () => { filter = btn.dataset.filter; render(); };
  });

  // 카드 클릭 → 수정
  document.querySelectorAll(".film-card").forEach(card => {
    card.onclick = () => {
      const id = Number(card.dataset.id);
      const item = items.find(i => i.id === id);
      if (item) openModal(item);
    };
  });

  // 추가 버튼
  const addBtn = document.getElementById("addBtn");
  if (addBtn) addBtn.onclick = () => openModal("add");

  // 모달 관련
  const overlay = document.getElementById("modalOverlay");
  if (overlay) {
    overlay.onclick = (e) => { if (e.target === overlay) closeModal(); };
    const sheet = document.getElementById("modalSheet");
    if (sheet) sheet.onclick = (e) => e.stopPropagation();

    // 제목 입력
    const titleInput = document.getElementById("titleInput");
    if (titleInput) {
      titleInput.oninput = (e) => {
        modalForm.title = e.target.value;
        const det = autoDetect(e.target.value);
        suggestState = det || null;
        render();
        // 포커스 복원
        const ti = document.getElementById("titleInput");
        if (ti) { ti.focus(); ti.setSelectionRange(ti.value.length, ti.value.length); }
      };
    }

    // 제안 적용/닫기
    const sApply = document.getElementById("suggestApply");
    if (sApply) sApply.onclick = () => { modalForm.emoji = suggestState.emoji; modalForm.color = suggestState.color; suggestState = null; render(); };
    const sDismiss = document.getElementById("suggestDismiss");
    if (sDismiss) sDismiss.onclick = () => { suggestState = null; render(); };

    // 이모지 선택
    document.querySelectorAll(".emoji-btn").forEach(btn => {
      btn.onclick = () => { modalForm.emoji = btn.dataset.emoji; render(); };
    });
    // 색상 선택
    document.querySelectorAll(".color-btn").forEach(btn => {
      btn.onclick = () => { modalForm.color = btn.dataset.color; render(); };
    });
    // 양력/음력 토글
    document.querySelectorAll(".type-btn").forEach(btn => {
      btn.onclick = () => { modalForm.isLunar = btn.dataset.lunar === "true"; render(); };
    });
    // 음력 선택
    const lmSel = document.getElementById("lmSelect");
    if (lmSel) lmSel.onchange = (e) => { modalForm.lm = Number(e.target.value); render(); };
    const ldSel = document.getElementById("ldSelect");
    if (ldSel) ldSel.onchange = (e) => { modalForm.ld = Number(e.target.value); render(); };
    // 날짜
    const dateInput = document.getElementById("dateInput");
    if (dateInput) dateInput.onchange = (e) => { modalForm.date = e.target.value; };
    // 태그/반복
    const tagSel = document.getElementById("tagSelect");
    if (tagSel) tagSel.onchange = (e) => { modalForm.tag = e.target.value; };
    const repSel = document.getElementById("repeatSelect");
    if (repSel) repSel.onchange = (e) => { modalForm.repeat = e.target.value; };

    // 사진 드롭존
    const photoDrop = document.getElementById("photoDrop");
    const photoFileInput = document.getElementById("photoFileInput");
    if (photoDrop && photoFileInput) {
      photoDrop.onclick = () => photoFileInput.click();
      photoDrop.ondragover = (e) => { e.preventDefault(); photoDrop.classList.add("dragover"); };
      photoDrop.ondragleave = () => photoDrop.classList.remove("dragover");
      photoDrop.ondrop = (e) => {
        e.preventDefault();
        photoDrop.classList.remove("dragover");
        handlePhotoFile(e.dataTransfer.files[0]);
      };
    }
    if (photoFileInput) {
      photoFileInput.onchange = (e) => handlePhotoFile(e.target.files[0]);
    }
    // 사진 드래그로 위치 조정
    const photoPreview = document.getElementById("photoPreview");
    const photoPreviewImg = document.getElementById("photoPreviewImg");
    if (photoPreview && photoPreviewImg) {
      let dragging = false;
      let startX = 0, startY = 0;
      let startPos = { x: 50, y: 50 };
      photoPreview.onpointerdown = (e) => {
        if (e.target.closest("button")) return;
        dragging = true;
        startX = e.clientX;
        startY = e.clientY;
        startPos = modalForm.photoPos ? { ...modalForm.photoPos } : { x: 50, y: 50 };
        if (photoPreview.setPointerCapture) {
          try { photoPreview.setPointerCapture(e.pointerId); } catch (_) {}
        }
        e.preventDefault();
      };
      photoPreview.onpointermove = (e) => {
        if (!dragging) return;
        const rect = photoPreview.getBoundingClientRect();
        const dx = e.clientX - startX;
        const dy = e.clientY - startY;
        let nx = startPos.x - (dx / rect.width) * 100;
        let ny = startPos.y - (dy / rect.height) * 100;
        nx = Math.max(0, Math.min(100, nx));
        ny = Math.max(0, Math.min(100, ny));
        modalForm.photoPos = { x: nx, y: ny };
        photoPreviewImg.style.objectPosition = nx + "% " + ny + "%";
      };
      const endDrag = (e) => {
        if (!dragging) return;
        dragging = false;
        if (photoPreview.releasePointerCapture) {
          try { photoPreview.releasePointerCapture(e.pointerId); } catch (_) {}
        }
      };
      photoPreview.onpointerup = endDrag;
      photoPreview.onpointercancel = endDrag;
    }
    const photoChangeBtn = document.getElementById("photoChangeBtn");
    if (photoChangeBtn) photoChangeBtn.onclick = () => photoFileInput && photoFileInput.click();
    const photoDeleteBtn = document.getElementById("photoDeleteBtn");
    if (photoDeleteBtn) photoDeleteBtn.onclick = () => {
      modalForm.photo = "";
      modalForm._origSize = null;
      modalForm._compSize = null;
      modalForm.photoPos = { x: 50, y: 50 };
      render();
    };

    // 저장/삭제
    const saveBtn = document.getElementById("saveBtn");
    if (saveBtn) saveBtn.onclick = handleSave;
    const deleteBtn = document.getElementById("deleteBtn");
    if (deleteBtn) deleteBtn.onclick = handleDelete;
  }
}

async function handlePhotoFile(file) {
  if (!file || !file.type.startsWith("image/")) return;
  modalForm._origSize = file.size;
  // 압축 중 표시
  const photoSection = document.querySelector(".photo-section");
  if (photoSection) {
    photoSection.innerHTML = '<div class="field-label">📷 사진 (자동 압축 저장)</div><div class="photo-drop"><span class="icon">⏳</span><span class="txt1">압축 중...</span></div>';
  }
  try {
    const compressed = await compressImage(file, 900, 0.75);
    modalForm.photo = compressed;
    modalForm._compSize = byteSize(compressed);
    modalForm.photoPos = { x: 50, y: 50 };
  } catch (err) {
    console.error("이미지 압축 실패:", err);
  }
  render();
}

function openModal(target) {
  if (target === "add") {
    modalState = "add";
    modalForm = { title:"", date: fmt(new Date()), repeat:"없음", emoji:"🎯", tag:"기념일", color:"#FF6B9D", isLunar:false, lm:1, ld:1, photo:"", photoPos:{x:50,y:50} };
  } else {
    modalState = target;
    modalForm = { ...target };
    if (!modalForm.photoPos) modalForm.photoPos = { x: 50, y: 50 };
  }
  suggestState = null;
  render();
}

function closeModal() {
  modalState = null;
  modalForm = null;
  suggestState = null;
  render();
}

async function handleSave() {
  if (!modalForm.title || !modalForm.title.trim()) return;
  const toSave = { ...modalForm };
  delete toSave._origSize;
  delete toSave._compSize;
  const next = toSave.id ? toSave : { ...toSave, id: Date.now() };
  try { await dbPut(next); } catch (e) { console.error(e); }
  if (toSave.id) {
    items = items.map(it => it.id === next.id ? next : it);
  } else {
    items = [...items, next];
  }
  await refreshStorageInfo();
  closeModal();
}

async function handleDelete() {
  const id = modalForm.id;
  try { await dbDelete(id); } catch (e) { console.error(e); }
  items = items.filter(it => it.id !== id);
  closeModal();
}

async function refreshStorageInfo() {
  if (navigator.storage && navigator.storage.estimate) {
    try {
      const { usage, quota } = await navigator.storage.estimate();
      storageInfo = { usage, quota };
    } catch (e) {}
  }
}

// ════════════════════════════════════════════════
// 초기화
// ════════════════════════════════════════════════
async function init() {
  try {
    const rows = await dbGetAll();
    if (rows.length === 0) {
      await Promise.all(DEFAULT_ITEMS.map(it => dbPut(it)));
      items = DEFAULT_ITEMS;
    } else {
      items = rows.sort((a, b) => a.id - b.id);
    }
  } catch (e) {
    console.error("DB 로드 실패, 기본값 사용:", e);
    items = DEFAULT_ITEMS;
  }
  await refreshStorageInfo();
  render();
}

init();
</script>
</body>
